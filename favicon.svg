<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0f0f11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Abstract "B" left stem with balance line -->
  <path d="M25 25 L25 75 M25 50 L45 50" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Balance point -->
  <circle cx="50" cy="50" r="6" fill="url(#accent)"/>
  <!-- Abstract "B" right curve -->
  <path d="M55 30 Q70 30 70 50 Q70 70 55 70" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Balance base -->
  <path d="M35 75 L65 75" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
</svg>
