<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | Boldly Balance</title>
    <link rel="canonical" href="https://boldlybalance.life/category/case-study.html">
    <meta name="description" content="Real people, real results. In-depth explorations of how decisions led to outcomes.">
    <meta property="og:title" content="Case Study | Boldly Balance">
    <meta property="og:description" content="Real people, real results. In-depth explorations of how decisions led to outcomes.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://boldlybalance.life/category/case-study.html">
    <meta property="og:image" content="https://images.unsplash.com/photo-1552664730-d307ca884978?w=1200&h=630&fit=crop">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="../styles.css">
    <script>const categorySlug = "case-study"; const categoryName = "Case Study";</script>
    <style>
.cat-hero { text-align:center;padding:4rem 2rem 2rem;max-width:700px;margin:0 auto; }
        .cat-hero h1 { font-size:2.5rem;font-weight:700;margin-bottom:0.75rem;letter-spacing:-0.02em; }
        .cat-hero p { font-size:1.1rem;color:var(--text-muted);line-height:1.6;max-width:500px;margin:0 auto; }
        .featured-grid { display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:900px;margin:0 auto;padding:1.5rem 2rem; }
        .featured-main { grid-row:1/3;position:relative;border-radius:16px;overflow:hidden;text-decoration:none;display:block; }
        .featured-main img { width:100%;height:100%;object-fit:cover;transition:transform 0.3s; }
        .featured-main:hover img { transform:scale(1.03); }
        .featured-main .overlay { position:absolute;bottom:0;left:0;right:0;padding:2rem 1.5rem 1.5rem;background:linear-gradient(transparent,rgba(0,0,0,0.85)); }
        .featured-main .overlay span { font-size:0.7rem;color:var(--primary);text-transform:uppercase;font-weight:600; }
        .featured-main .overlay h2 { font-size:1.3rem;font-weight:600;color:#fff;margin:0.3rem 0 0;line-height:1.3; }
        .featured-side { position:relative;border-radius:16px;overflow:hidden;text-decoration:none;display:flex;flex-direction:column; }
        .featured-side img { width:100%;height:140px;object-fit:cover;transition:transform 0.3s; }
        .featured-side:hover img { transform:scale(1.03); }
        .featured-side .side-content { padding:1rem 1.25rem;background:var(--bg-card);flex:1;display:flex;flex-direction:column;justify-content:center; }
        .featured-side .side-content span { font-size:0.65rem;color:var(--primary);text-transform:uppercase;font-weight:600; }
        .featured-side .side-content h3 { font-size:0.95rem;font-weight:500;color:var(--text);margin:0.25rem 0 0;line-height:1.3; }
        .all-articles { max-width:900px;margin:0 auto;padding:2rem 2rem 3rem; }
        .all-articles h2 { font-size:1.3rem;margin-bottom:1.5rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border); }
        .article-list { display:flex;flex-direction:column;gap:0.75rem; }
        .article-item { display:flex;align-items:center;gap:1rem;padding:1rem;text-decoration:none;background:var(--bg-card);border-radius:12px;border:1px solid var(--border);transition:transform 0.2s,border-color 0.2s; }
        .article-item:hover { transform:translateX(4px);border-color:var(--primary); }
        .article-item .article-info { flex:1; }
        .article-item .article-info .tag { font-size:0.65rem;color:var(--primary);text-transform:uppercase;font-weight:600; }
        .article-item .article-info h3 { font-size:0.95rem;font-weight:500;color:var(--text);margin:0.2rem 0; }
        .article-item .article-info p { font-size:0.8rem;color:var(--text-muted);margin:0;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden; }
        .article-item .arrow { color:var(--text-muted);font-size:1.2rem;flex-shrink:0; }
        @media (max-width:768px) { .featured-grid { grid-template-columns:1fr; } .featured-main { grid-row:auto; } }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="../" class="logo">Boldly Balance</a>
            <div class="nav-links">
                <div class="dropdown">
                    <a href="../">Home ▾</a>
                    <div class="dropdown-content">
                        <a href="../category/fitness.html">Fitness</a>
                        <a href="../category/food.html">Food</a>
                        <a href="../category/sleep.html">Sleep</a>
                        <a href="../category/mindset.html">Mindset</a>
                        <a href="../category/wellness.html">Wellness</a>
                        <a href="../category/lifestyle.html">Lifestyle</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="cat-hero">
            <h1>Case Study</h1>
            <p>Real people, real results. In-depth explorations of how decisions led to outcomes.</p>
        </div>

        <div class="featured-grid" id="featured-grid"></div>

        <div class="all-articles">
            <h2>All Case Study Articles</h2>
            <div class="article-list" id="category-posts"></div>
        </div>
    </main>
    <footer><p>&copy; 2026 Boldly Balance.</p></footer>
    <script>
        async function loadCategoryPosts() {
            try {
                const res = await fetch('../posts.json');
                const posts = await res.json();
                const catPosts = posts.filter(p => p.category === 'Case Study');
                const featured = catPosts.slice(0, 3);
                const grid = document.getElementById('featured-grid');
                if (featured.length > 0) {
                    const main = featured[0];
                    grid.innerHTML = `
                        <a href="../posts/${main.slug}.html" class="featured-main">
                            <img src="https://images.unsplash.com/${main.image}?w=600&h=400&fit=crop" alt="${main.title}">
                            <div class="overlay">
                                <span>${main.category}</span>
                                <h2>${main.title}</h2>
                            </div>
                        </a>`;
                    for (let i = 1; i < featured.length && i < 3; i++) {
                        const p = featured[i];
                        grid.innerHTML += `
                        <a href="../posts/${p.slug}.html" class="featured-side">
                            <img src="https://images.unsplash.com/${p.image}?w=400&h=200&fit=crop" alt="${p.title}">
                            <div class="side-content">
                                <span>${p.category}</span>
                                <h3>${p.title}</h3>
                            </div>
                        </a>`;
                    }
                }
                const list = document.getElementById('category-posts');
                const remaining = catPosts.slice(3);
                remaining.forEach(p => {
                    list.innerHTML += `
                        <a href="../posts/${p.slug}.html" class="article-item">
                            <div class="article-info">
                                <span class="tag">${p.category}</span>
                                <h3>${p.title}</h3>
                                <p>${p.excerpt}</p>
                            </div>
                            <span class="arrow">→</span>
                        </a>`;
                });
            } catch(e) { console.error(e); }
        }
        loadCategoryPosts();
    </script>
</body>
</html>
